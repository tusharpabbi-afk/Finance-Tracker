*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f7;--bg2:#fff;--bg3:#f0f0f5;--bg4:#e5e5ea;--bdr:#e0e0e8;--bdr2:#d0d0db;--tx:#1c1c1e;--t2:#6e6e80;--t3:#adadc0;--ac:#5856d6;--a2:#6c63ff;--gr:#1a9e4a;--rd:#d03030;--gd:#b07800;--tl:#0080a0;--pu:#7030a0;--sh:0 1px 4px rgba(0,0,0,0.08)}
html,body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
input,select,textarea{font-family:'DM Sans',sans-serif;color:var(--tx);-webkit-appearance:none;background:var(--bg3);border:1.5px solid var(--bdr2);border-radius:8px;padding:.42rem .6rem;font-size:.83rem;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ac);background:#fff}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.scroll{flex:1;overflow-y:auto;padding:.9rem;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.bnav{display:flex;background:var(--bg2);border-top:1.5px solid var(--bdr);overflow-x:auto;flex-shrink:0}
.bnav::-webkit-scrollbar{display:none}
.bni{display:flex;flex-direction:column;align-items:center;gap:1px;padding:.4rem .5rem;cursor:pointer;color:var(--t3);font-size:.52rem;min-width:44px;border:none;background:none;font-family:'DM Sans',sans-serif;flex-shrink:0}
.bni.on{color:var(--ac)}
.bni-ico{font-size:1rem;line-height:1}
.card{background:var(--bg2);border:1.5px solid var(--bdr);border-radius:14px;padding:.9rem;margin-bottom:.7rem;box-shadow:var(--sh)}
.stl{font-family:'Syne',sans-serif;font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:.7rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.85rem}
.metric{background:var(--bg2);border:1.5px solid var(--bdr);border-radius:12px;padding:.7rem .85rem;box-shadow:var(--sh)}
.metric-l{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.15rem}
.metric-v{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700}
.metric-s{font-size:.6rem;color:var(--t2);margin-top:.12rem}
.pb{background:var(--bg4);border-radius:4px;overflow:hidden}
.pbf{height:100%;border-radius:4px;transition:width .4s}
.btn{padding:.42rem .85rem;border-radius:9px;border:1.5px solid var(--bdr2);background:var(--bg3);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;font-weight:500}
.btnp{padding:.42rem .85rem;border-radius:9px;border:none;background:var(--ac);color:#fff;font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;font-weight:600}
.btns{padding:.3rem .65rem;border-radius:8px;border:1.5px solid var(--bdr);background:var(--bg3);color:var(--t2);font-family:'DM Sans',sans-serif;font-size:.75rem;cursor:pointer}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.ph h2{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:-.02em}
.frow{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1.5px solid var(--bdr);font-size:.83rem;gap:.5rem}
.frow .fl{color:var(--t2);flex:1}
.frow input{width:130px;text-align:right;flex-shrink:0}
.tw{overflow-x:auto;border-radius:12px;border:1.5px solid var(--bdr)}
table{width:100%;border-collapse:collapse;font-size:.77rem;background:var(--bg2)}
thead tr{background:var(--bg3)}
th{text-align:left;padding:.42rem .55rem;font-size:.6rem;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;font-weight:700;white-space:nowrap;border-bottom:1.5px solid var(--bdr)}
td{padding:.4rem .55rem;border-bottom:1px solid var(--bdr);vertical-align:middle}
tr:nth-child(even) td{background:var(--bg3)}
tr:last-child td{border-bottom:none}
.ie{background:var(--bg3);border:1.5px solid var(--ac);border-radius:6px;padding:.18rem .4rem;color:var(--tx);font-size:.76rem;width:auto}
.cfrow{display:flex;justify-content:space-between;padding:.32rem 0;font-size:.82rem;border-bottom:1px solid var(--bdr)}
.lstats{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-bottom:.55rem}
.lstat{background:var(--bg3);border-radius:9px;padding:.45rem;text-align:center;border:1px solid var(--bdr)}
.ppbox{background:var(--bg3);border-radius:10px;padding:.6rem;margin-top:.75rem;border:1px solid var(--bdr)}
.ppbox input{margin-top:.4rem}
.itin{display:grid;grid-template-columns:38px 42px 1fr 55px;gap:.4rem;align-items:center;padding:.45rem .55rem;background:var(--bg3);border-radius:9px;margin-bottom:.3rem;font-size:.77rem;border:1px solid var(--bdr)}
.rvc{background:var(--bg2);border:1.5px solid var(--bdr);border-radius:12px;padding:.85rem;margin-bottom:.55rem}
.twocol{margin-bottom:.75rem}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:1rem;color:var(--t2)}
.spin{width:28px;height:28px;border:2.5px solid var(--bdr2);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(min-width:600px){.twocol{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}.grid2{grid-template-columns:repeat(4,1fr)}.fgrid{grid-template-columns:repeat(3,1fr)}}

.ff{display:flex;flex-direction:column;gap:.22rem}
.ff label{font-size:.62rem;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.fa{display:flex;gap:.45rem;margin-top:.7rem}
.bdg{display:inline-flex;padding:.1rem .4rem;border-radius:20px;font-size:.63rem;font-weight:600}
.mo-tile{border-radius:10px;padding:.5rem .4rem;cursor:pointer;text-align:center;transition:all .15s;border:1.5px solid var(--bdr);background:var(--bg3)}
.mo-tile .mo-name{font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;color:var(--t2)}
.mo-tile .mo-val{font-size:.6rem;font-weight:600;color:var(--t3);margin-top:2px}
.mo-tile.green{background:rgba(26,158,74,.08);border-color:rgba(26,158,74,.3)}
.mo-tile.green .mo-val{color:var(--gr)}
.mo-tile.red{background:rgba(208,48,48,.08);border-color:rgba(208,48,48,.3)}
.mo-tile.red .mo-val{color:var(--rd)}
.mo-tile.cur{border-color:var(--ac);background:rgba(88,86,214,.08)}
.mo-tile.cur .mo-name{color:var(--ac)}
.mo-tile.sel{background:var(--ac);border-color:var(--ac)}

.mo-tile.sel .mo-val{color:rgba(255,255,255,.85)}
.rem-card{border-radius:14px;padding:.85rem;margin-bottom:.7rem;box-shadow:var(--sh)}
.rem-card .rem-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.8;margin-bottom:.22rem}
.rem-card .rem-amt{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;letter-spacing:-.03em}

.bud-row{display:grid;grid-template-columns:1fr 82px 82px;gap:.3rem;align-items:center;padding:.32rem 0;border-bottom:1px solid var(--bdr)}
.bud-row input{width:100%;text-align:right;font-size:.77rem;padding:.2rem .4rem}
.yr-nav{display:flex;gap:.35rem;align-items:center}
.yr-nav button{background:none;border:1.5px solid var(--bdr);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:.9rem;color:var(--tx)}
.yr-nav span{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;min-width:44px;text-align:center}

function el(tag, attrs, parent) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === 'text') e.textContent = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k === 'cls') e.className = attrs[k];
    else if (k === 'style') e.style.cssText = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  if (parent) parent.appendChild(e);
  return e;
}
function clr(e) { while(e.firstChild) e.removeChild(e.firstChild); return e; }

// ─── STATE ───────────────────────────────────────────────────────────────────
var S = {};
function loadS() {
  S.fin = LS.g('tp_fin') || cl(DEF_FIN);
  S.mf = LS.g('tp_mf') || cl(DEF_MF);
  S.loans = LS.g('tp_loans') || cl(DEF_LOANS);
  S.eu = LS.g('tp_eu') || cl(DEF_EU);
  S.ti = LS.g('tp_ti') || []; S.tu = LS.g('tp_tu') || []; S.tc = LS.g('tp_tc') || [];
  S.rv = LS.g('tp_rv') || [];
  S.bud = LS.g('tp_bud') || {inc:364053, rows:cl(DEF_ROWS), plans:{}};
  S.nwx = LS.g('tp_nwx') || [];
  S.tab = 'dash';
}
function sv(k,v) { S[k]=v; LS.s('tp_'+k,v); }
function getNW() {
  var h = cl(HNW);
  (S.nwx||[]).forEach(function(e) {
    var i = h.findIndex(function(x){return x.m===e.m;});
    if(i>=0) h[i]=e; else h.push(e);
  });
  h.sort(function(a,b){
    var ya=2000+parseInt(a.m.slice(-2)), yb=2000+parseInt(b.m.slice(-2));
    if(ya!==yb) return ya-yb;
    return MOS.indexOf(a.m.slice(0,3))-MOS.indexOf(b.m.slice(0,3));
  });
  return h;
}
function moKey(mo, yr) { return mo+" '"+String(yr).slice(2); }

// ─── CANVAS WORM ─────────────────────────────────────────────────────────────
function drawWorm(canvas, histIn, showAll) {
  if (!canvas) return;
  var hist = histIn || getNW();
  if (!hist || hist.length < 2) return;
  var DPR = window.devicePixelRatio || 1;
  var W = Math.max(canvas.parentElement ? canvas.parentElement.offsetWidth : 300, 280), H = 190;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  var ctx = canvas.getContext('2d'); ctx.scale(DPR, DPR);
  var P = {t:24, r:14, b:30, l:46}, CW=W-P.l-P.r, CH=H-P.t-P.b, n=hist.length;
  var all = [];
  hist.forEach(function(h){
    all.push(h.nw);
    if (showAll) { all.push(h.ast, h.dbt); }
  });
  var mn = Math.min.apply(null,all), mx = Math.max.apply(null,all);
  var rng = mx - mn; if (rng < 1) rng = 1;
  mn -= rng*0.1; mx += rng*0.08;
  function sy(v){return P.t+CH-((v-mn)/(mx-mn))*CH;}
  function sx(i){return P.l+(i/Math.max(n-1,1))*CW;}
  // Grid
  for(var g=0;g<=3;g++){
    var gy=P.t+g*CH/3;
    ctx.strokeStyle='#eeeef5'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(P.l,gy); ctx.lineTo(W-P.r,gy); ctx.stroke();
    var gv=mx-g*(mx-mn)/3;
    var lbl=Math.abs(gv)>=100000?((gv<0?'-':'')+(Math.abs(gv)/100000).toFixed(0)+'L'):(Math.abs(gv)>=1000?((gv<0?'-':'')+(Math.abs(gv)/1000).toFixed(0)+'k'):Math.round(gv)+'');
    ctx.fillStyle='#b0b0c8'; ctx.font='8px DM Sans'; ctx.textAlign='right';
    ctx.fillText(lbl,P.l-3,gy+3);
  }
  // Zero line
  if(mn<0&&mx>0){
    var zy=sy(0);
    ctx.strokeStyle='#c0c0da'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(P.l,zy); ctx.lineTo(W-P.r,zy); ctx.stroke(); ctx.setLineDash([]);
  }
  // Assets & Debt (showAll only)
  if(showAll){
    ctx.beginPath(); ctx.strokeStyle='rgba(26,158,74,0.4)'; ctx.lineWidth=1; ctx.lineJoin='round';
    hist.forEach(function(h,i){i?ctx.lineTo(sx(i),sy(h.ast)):ctx.moveTo(sx(i),sy(h.ast));}); ctx.stroke();
    ctx.beginPath(); ctx.strokeStyle='rgba(208,48,48,0.4)'; ctx.lineWidth=1; ctx.lineJoin='round';
    hist.forEach(function(h,i){i?ctx.lineTo(sx(i),sy(h.dbt)):ctx.moveTo(sx(i),sy(h.dbt));}); ctx.stroke();
  }
  // NW fill
  var fillBase=mn<0?sy(0):P.t+CH;
  var grad=ctx.createLinearGradient(0,P.t,0,P.t+CH);
  grad.addColorStop(0,'rgba(88,86,214,0.18)'); grad.addColorStop(1,'rgba(88,86,214,0)');
  ctx.beginPath(); ctx.moveTo(sx(0),fillBase);
  hist.forEach(function(h,i){ctx.lineTo(sx(i),sy(h.nw));});
  ctx.lineTo(sx(n-1),fillBase); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  // NW line
  ctx.beginPath(); ctx.strokeStyle='#5856d6'; ctx.lineWidth=2.2; ctx.lineJoin='round'; ctx.lineCap='round';
  hist.forEach(function(h,i){
    if(!i){ctx.moveTo(sx(0),sy(h.nw));return;}
    var cpx=(sx(i-1)+sx(i))/2;
    ctx.bezierCurveTo(cpx,sy(hist[i-1].nw),cpx,sy(h.nw),sx(i),sy(h.nw));
  }); ctx.stroke();
  // Dots
  hist.forEach(function(h,i){
    if(i%8===0||i===n-1){
      ctx.beginPath(); ctx.arc(sx(i),sy(h.nw),i===n-1?4:2,0,Math.PI*2);
      if(i===n-1){ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#5856d6';ctx.lineWidth=2;ctx.stroke();}
      else{ctx.fillStyle='#5856d6';ctx.fill();}
    }
  });
  // Wedding annotation - only if Jan 25 is NOT the last point
  var wi=hist.findIndex(function(h){return h.m==="Jan '25";});
  if(wi>=0&&wi<n-2){
    ctx.strokeStyle='rgba(176,120,0,0.45)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(sx(wi),P.t+2); ctx.lineTo(sx(wi),P.t+CH); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='rgba(176,120,0,0.85)'; ctx.font='bold 7px DM Sans'; ctx.textAlign='left';
    ctx.fillText("Jan'25",sx(wi)+3,P.t+10);
  }
  // Current value
  var lv=fL(hist[n-1].nw);
  var lxv=sx(n-1)+5; if(lxv+30>W-P.r) lxv=sx(n-1)-38;
  ctx.fillStyle='#5856d6'; ctx.font='bold 9px DM Sans'; ctx.textAlign='left';
  ctx.fillText(lv,lxv,sy(hist[n-1].nw)-5);
  // X labels
  ctx.fillStyle='#a0a0b8'; ctx.font='8px DM Sans'; ctx.textAlign='center';
  var lastYr='';
  hist.forEach(function(h,i){
    var yr=h.m.slice(-2);
    if(h.m.startsWith('Jan')&&yr!==lastYr){ctx.fillText("'"+yr,sx(i),H-3);lastYr=yr;}
    if(i===n-1&&!h.m.startsWith('Jan')) ctx.fillText(h.m.slice(0,3),sx(i),H-3);
  });
  // Legend
  var lxl=P.l;
  var legItems=showAll?[{c:'#5856d6',l:'NW'},{c:'rgba(26,158,74,0.7)',l:'Assets'},{c:'rgba(208,48,48,0.7)',l:'Debt'}]:[{c:'#5856d6',l:'Net Worth Journey'}];
  legItems.forEach(function(s){
    ctx.strokeStyle=s.c; ctx.lineWidth=s.c==='#5856d6'?2:1.2;
    ctx.beginPath(); ctx.moveTo(lxl,8); ctx.lineTo(lxl+10,8); ctx.stroke();
    ctx.fillStyle='#8888a8'; ctx.font='8px DM Sans'; ctx.textAlign='left';
    ctx.fillText(s.l,lxl+13,11); lxl+=ctx.measureText(s.l).width+28;
  });
}


// ─── MONTH GRID (reusable) ───────────────────────────────────────────────────
function moGrid(yr, selKey, curMo, curYr, getVal, onClick, parent) {
  var grid = div({style:'display:grid;grid-template-columns:repeat(4,1fr);gap:.42rem;margin-bottom:.7rem'}, parent);
  MOS.forEach(function(mo, i) {
    var key = moKey(mo, yr);
    var isCur = (yr===curYr && (i+1)===curMo);
    var isFut = (yr>curYr)||(yr===curYr&&(i+1)>curMo);
    var isSel = (selKey===key);
    var val = getVal(key, i, yr, isCur, isFut);
    var cls = 'mo-tile';
    if(isSel) cls+=' sel';
    else if(isCur) cls+=' cur';
    else if(val!==null && val>=0) cls+=' green';
    else if(val!==null && val<0) cls+=' red';
    if(isFut && val===null) { var t=div({cls:cls, style:'opacity:.6'}, grid); }
    else { var t=div({cls:cls}, grid); }
    div({cls:'mo-name', text:mo}, t);
    var valStr = val!==null ? (val>=0?'+':'-')+'\u20b9'+(Math.abs(val)>=100000?(Math.abs(val)/100000).toFixed(1)+'L':(Math.abs(val)>=1000?(Math.abs(val)/1000).toFixed(0)+'k':Math.abs(val)+'')) : (isFut?'plan':'--');
    div({cls:'mo-val', text:valStr}, t);
    if(isCur) { var dot=div({style:'width:4px;height:4px;background:var(--ac);border-radius:50%;margin:2px auto 0'}, t); }
    t.addEventListener('click', function(){ onClick(key, i, yr, isCur, isFut); });
  });
  return grid;
}

function renderBudEditor(container, key, isCur, isFut) {
  var b=S.bud, plan=(b.plans||{})[key];
  var rows=isCur?b.rows:(plan?plan.rows:cl(DEF_ROWS));
  var inc=isCur?b.inc:(plan?plan.inc:185000);

  function calcTots() {
    var tA=rows.reduce(function(s,r){return s+(+(r.a||0));},0);
    var tB=rows.reduce(function(s,r){return s+(+(r.b||0));},0);
    return {tA:tA, tB:tB, rem:inc-(isCur?tA:tB), pct:inc?Math.min(Math.round((isCur?tA:tB)/inc*100),100):0};
  }

  // Remaining card
  function updateRem() {
    var t=calcTots();
    var isNeg=t.rem<0;
    remCard.style.background=isNeg?'linear-gradient(135deg,#c03030,#e04040)':'linear-gradient(135deg,var(--ac),var(--a2))';
    remAmt.textContent='\u20b9'+fmt(t.rem);
    remInf.textContent=(isCur?'Spent':'Planned')+' \u20b9'+fmt(isCur?t.tA:t.tB)+' of \u20b9'+fmt(inc)+' \u00b7 '+t.pct+'%';
    remBar.style.width=t.pct+'%';
    if(totBEl) totBEl.textContent='\u20b9'+fmt(t.tB);
    if(totAEl&&isCur) totAEl.textContent='\u20b9'+fmt(t.tA);
    if(remBEl) remBEl.textContent='\u20b9'+fmt(inc-t.tB);
    if(remAEl&&isCur){remAEl.textContent='\u20b9'+fmt(t.rem);remAEl.style.color=pc(t.rem);}
  }

  var t0=calcTots();
  var remCard=div({cls:'rem-card', style:'background:'+(t0.rem<0?'linear-gradient(135deg,#c03030,#e04040)':'linear-gradient(135deg,var(--ac),var(--a2))')}, container);
  div({cls:'rem-lbl', text:(isFut?'Planned Remaining':'Remaining')+' \u2014 '+key}, remCard);
  var remAmt=div({cls:'rem-amt', html:'\u20b9'+fmt(t0.rem)}, remCard);
  var remInf=div({cls:'rem-inf', text:(isCur?'Spent':'Planned')+' \u20b9'+fmt(isCur?t0.tA:t0.tB)+' of \u20b9'+fmt(inc)+' \u00b7 '+t0.pct+'%'}, remCard);
  var bpb=div({style:'background:rgba(255,255,255,.25);border-radius:4px;height:5px;margin-top:.45rem;overflow:hidden'}, remCard);
  var remBar=div({style:'height:100%;width:'+t0.pct+'%;background:#fff;border-radius:4px'}, bpb);

  var card=div({cls:'card'}, container);
  var cph=div({style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem'}, card);
  stlDiv((isCur?'Edit: ':'Plan: ')+key, cph);
  var cbts=div({style:'display:flex;gap:.38rem'}, cph);
  if(!isCur) btn({cls:'btns', text:'Copy current', onclick:function(){
    if(!S.bud.plans) S.bud.plans={};
    S.bud.plans[key]={inc:S.bud.inc,rows:cl(S.bud.rows)};
    sv('bud',S.bud); renderBudDet(container,key);
  }}, cbts);
  btn({cls:'btnp', text:'Save', style:'font-size:.77rem;padding:.3rem .65rem', onclick:function(){
    if(isCur){sv('bud',S.bud);}
    else{
      if(!S.bud.plans) S.bud.plans={};
      if(!S.bud.plans[key]) S.bud.plans[key]={inc:inc,rows:cl(DEF_ROWS)};
      S.bud.plans[key].rows=rows; S.bud.plans[key].inc=inc;
      var t2=calcTots(); S.bud.plans[key].sav=inc-(isCur?t2.tA:t2.tB);
      sv('bud',S.bud);
    }
    alert('Saved: '+key);
  }}, cbts);

  // Income row
  var incRow=div({style:'display:flex;justify-content:space-between;align-items:center;padding:.38rem 0;border-bottom:1.5px solid var(--bdr);margin-bottom:.4rem'}, card);
  span({text:'Income', style:'color:var(--t2);font-weight:600;font-size:.83rem'}, incRow);
  var incInp=inp({type:'number',value:String(inc), style:'width:120px;text-align:right;font-weight:700;color:var(--gr)'}, incRow);
  incInp.addEventListener('input', function(){
    inc=+(this.value)||0;
    if(isCur) S.bud.inc=inc;
    else{ if(!S.bud.plans) S.bud.plans={}; if(!S.bud.plans[key]) S.bud.plans[key]={inc:inc,rows:cl(DEF_ROWS)}; S.bud.plans[key].inc=inc; }
    updateRem();
  });

  // Header row
  var hdr=div({cls:'bud-row', style:'border-bottom:1px solid var(--bdr);margin-bottom:.25rem'}, card);
  span({text:'Category', style:'font-size:.6rem;color:var(--t3);font-weight:700;text-transform:uppercase'}, hdr);
  span({text:isCur?'Budget':'Plan', style:'font-size:.6rem;color:var(--t3);font-weight:700;text-align:right'}, hdr);

  rows.forEach(function(r, i) {

      rows[i].b=+(this.value)||0;
      if(!isCur&&S.bud.plans&&S.bud.plans[key]) S.bud.plans[key].rows[i].b=rows[i].b;
      updateRem();

    if(isCur) {
      var aInp=inp({type:'number', value:String(r.a||''), placeholder:'0'}, row);
      aInp.addEventListener('input', function(){
        rows[i].a=+(this.value)||0;
        if(isCur) S.bud.rows[i].a=rows[i].a;
        updateRem();
      });

      span({text:'\u2014', style:'text-align:right;color:var(--t3);font-size:.77rem'}, row);

  var t1=calcTots();

  span({text:'Total', style:'font-weight:700;font-size:.82rem'}, totRow);
  totBEl=span({html:'\u20b9'+fmt(t1.tB), style:'text-align:right;font-weight:600;color:var(--t2);font-size:.8rem'}, totRow);
  totAEl=span({html:isCur?'\u20b9'+fmt(t1.tA):'\u2014', style:'text-align:right;font-weight:700;font-size:.82rem;color:var(--rd)'}, totRow);
  var remRow=div({style:'display:grid;grid-template-columns:1fr 82px 82px;gap:.3rem;padding:.32rem 0 0'}, card);
  span({text:'Remaining', style:'font-weight:700;font-size:.82rem;color:var(--gr)'}, remRow);
  remBEl=span({html:'\u20b9'+fmt(inc-t1.tB), style:'text-align:right;font-weight:600;font-size:.8rem;color:var(--t2)'}, remRow);
  remAEl=span({html:isCur?'\u20b9'+fmt(t1.rem):'\u2014', style:'text-align:right;font-weight:700;font-size:.87rem;color:'+pc(t1.rem)}, remRow);

  btn({cls:'btn', text:'+ Add Category', style:'width:100%;margin-top:.5rem;margin-bottom:.65rem', onclick:function(){
    var cat=prompt('Category name:',''); if(!cat) return;
    rows.push({cat:cat,b:0,a:0});
    if(isCur) S.bud.rows=rows;
    sv('bud',S.bud); renderBudDet(container,key);
  }}, card);
}

  var totS=eu.cats.reduce(function(s,c){return s+(c.s||0);},0);
  var totT=eu.cats.reduce(function(s,c){return s+(c.t||0);},0);
  var p2=totT?Math.round(totS/totT*100):0, ml=Math.ceil((totT-totS)/(eu.monthly||16500));
  var ph=phRow('\uD83C\uDF0D Europe', container);
  btn({cls:'btnp', text:'+ Savings', onclick:function(){addEuOpen=!addEuOpen;renderEuro(container);}}, ph);
  var mg=div({cls:'grid2'}, container);
  metric('Target','\u20b9'+fmt(totT),'var(--tl)','',mg); metric('Saved','\u20b9'+fmt(totS),'var(--gr)','',mg);
  metric('Remaining','\u20b9'+fmt(totT-totS),'var(--rd)','',mg); metric('Months Left','~'+ml,'var(--gd)','',mg);
  var pc2=div({cls:'card'},container);
  var pt=div({style:'display:flex;justify-content:space-between;font-weight:600;margin-bottom:.4rem;font-size:.85rem'},pc2);
  span({text:'Progress'},pt); span({text:p2+'%', style:'color:var(--tl)'},pt);
  pc2.appendChild(pb(p2,'var(--tl)',9));
  div({style:'font-size:.7rem;color:var(--t2);margin-top:.4rem',html:'\u20b9'+fmt(eu.monthly)+'/month \u00b7 ~'+ml+' months remaining'},pc2);

  if(addEuOpen) {
    var ac3=div({cls:'card', style:'border-color:var(--ac);border-width:2px'},container);
    stlDiv('Log Savings',ac3); var fg3=div({cls:'fgrid'},ac3);
    var f4=div({cls:'ff'},fg3); el('label',{text:'Amount \u20b9'},f4); var ai=inp({type:'number'},f4);
    var f5=div({cls:'ff'},fg3); el('label',{text:'Note'},f5); var ni2=inp({},f5);
    var fa3=div({cls:'fa'},ac3);
    btn({cls:'btnp', text:'Add', onclick:function(){
      var a=+(ai.value)||0; if(!a){alert('Enter amount');return;}
      var totS2=S.eu.cats.reduce(function(s,c){return s+(c.s||0);},0);
      S.eu.saved=totS2+a; S.eu.log=(S.eu.log||[]).concat([{d:'2026-05-19',a:a,n:ni2.value||''}]);
      sv('eu',S.eu); addEuOpen=false; renderEuro(container);
    }},fa3);
    btn({cls:'btn', text:'Cancel', onclick:function(){addEuOpen=false;renderEuro(container);}},fa3);
  }

  var tc3=div({cls:'twocol'},container);
  var bc=div({cls:'card'},tc3); stlDiv('Budget',bc);
  eu.cats.forEach(function(c,i){
    var cp=c.t?Math.round((c.s||0)/c.t*100):0;
    var cr=div({style:'margin-bottom:.7rem'},bc);
    var ct=div({style:'display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:.2rem'},cr);
    span({text:c.n, style:'color:var(--t2)'},ct);
    var cv2=span({},ct);
    var cs=span({html:'\u20b9'+fmt(c.s), style:'color:var(--tl);font-weight:600;cursor:pointer;text-decoration:underline dotted'},cv2);
    cs.addEventListener('click',function(){
      var v=prompt('Saved for '+c.n+':',c.s||0); if(v===null) return;
      eu.cats[i].s=Math.max(0,+(v)||0); eu.saved=eu.cats.reduce(function(s,x){return s+(x.s||0);},0);
      sv('eu',S.eu); renderEuro(container);
    });
    span({html:' / \u20b9'+fmt(c.t), style:'color:var(--t3)'},cv2);
    cr.appendChild(pb(cp,cp>=100?'var(--gr)':'var(--tl)',3));
  });
  var lc2=div({cls:'card'},tc3); stlDiv('Savings Log',lc2);
  if(!(eu.log&&eu.log.length)) div({style:'text-align:center;padding:1rem;color:var(--t3);font-size:.8rem',text:'No entries yet'},lc2);
  (eu.log||[]).slice(-8).reverse().forEach(function(e){
    var lr=div({style:'display:flex;justify-content:space-between;padding:.28rem 0;border-bottom:1px solid var(--bdr);font-size:.8rem'},lc2);
    span({text:e.d, style:'color:var(--t3)'},lr); span({html:'+\u20b9'+fmt(e.a), style:'color:var(--gr);font-weight:600'},lr);
    if(e.n) span({text:e.n, style:'color:var(--t3);font-size:.7rem'},lr);
  });
}

// ─── REVIEW ───────────────────────────────────────────────────────────────────
var revMo="May '26", revDraft={};
function renderReview(container) {
  clr(container);
  var ph=phRow('Review', container);
  var rc=div({style:'display:flex;gap:.4rem;align-items:center'},ph);
  var mi=inp({value:revMo, style:'width:88px;font-size:.82rem;text-align:center'},rc);
  mi.addEventListener('input',function(){revMo=this.value;});
  btn({cls:'btnp', text:'Save', onclick:function(){
    var found=S.rv.find(function(r){return r.month===revMo;})||{};
    var merged=Object.assign({},found,revDraft,{month:revMo});
    S.rv=S.rv.filter(function(r){return r.month!==revMo;}).concat([merged]);
    sv('rv',S.rv); revDraft={}; alert('Saved: '+revMo);
  }},rc);

  var found=S.rv.find(function(r){return r.month===revMo;})||{};
  var rg=div({},container);
  [['worked','What worked?','var(--gr)'],["didnt","What didn't?",'var(--rd)'],['mistakes','Mistakes','var(--gd)'],['rules',"O'Neil rules broke",'var(--pu)'],['wins','Finance wins','var(--tl)'],['plan','Next month plan','#5856d6'],['market','Market notes','var(--t2)']].forEach(function(f){
    var rc2=div({cls:'rvc'},rg);
    el('label',{text:f[1], style:'display:block;color:'+f[2]+';font-size:.78rem;font-weight:700;margin-bottom:.4rem'},rc2);
    var ta=el('textarea',{rows:'3', placeholder:'Write here...'},rc2);
    ta.value=found[f[0]]||revDraft[f[0]]||'';
    ta.addEventListener('input',function(){revDraft[f[0]]=this.value;});
  });
  if(S.rv.length){
    var pc3=div({cls:'card'},container); stlDiv('Past Reviews',pc3);
    var pw=div({style:'display:flex;flex-wrap:wrap;gap:.4rem'},pc3);
    S.rv.slice().reverse().forEach(function(r){
      btn({text:r.month, style:'background:'+(r.month===revMo?'var(--ac)':'var(--bg3)')+';color:'+(r.month===revMo?'#fff':'var(--t2)')+';border:1.5px solid '+(r.month===revMo?'var(--ac)':'var(--bdr)')+';border-radius:8px;padding:.28rem .65rem;font-size:.77rem;cursor:pointer;font-family:DM Sans,sans-serif', onclick:function(){revMo=r.month;revDraft={};renderReview(container);}},pw);
    });
  }
}

// ─── MAIN ─────────────────────────────────────────────────────────────────────
var TABS = [
  {id:'dash',l:'Home',e:'\uD83C\uDFE0'},{id:'bud',l:'Budget',e:'\uD83D\uDCC5'},
  {id:'nw',l:'Net Worth',e:'\uD83D\uDCC8'},{id:'mf',l:'MF',e:'\uD83D\uDCCA'},{id:'loans',l:'Loans',e:'\uD83C\uDFE6'},
  {id:'india',l:'India',e:'\uD83D\uDCCA'},{id:'us',l:'US',e:'\uD83C\uDDFA\uD83C\uDDF8'},
  {id:'crypto',l:'Crypto',e:'\u20BF'},{id:'eu',l:'Europe',e:'\uD83C\uDF0D'},
  {id:'rev',l:'Review',e:'\uD83D\uDCDD'}
];

function setTab(id) {
  S.tab=id; edMfId=null; edMfData={}; addMfOpen=false;
  edLoanId=null; edLoanData={}; addTrdKey=null; addEuOpen=false;
  renderNav(); renderContent();
}

function renderNav() {
  var nav=document.getElementById('nav'); clr(nav);
  TABS.forEach(function(t){
    var b=btn({cls:'bni'+(S.tab===t.id?' on':''), onclick:function(){setTab(t.id);}}, nav);
    div({cls:'bni-ico', html:t.e}, b);
    div({text:t.l}, b);
  });
}

function renderContent() {
  var c=document.getElementById('content'); clr(c);
  var t=S.tab;
  if(t==='dash') renderDash(c);
  else if(t==='bud') renderBudget(c);
  else if(t==='nw') renderNW(c);
  else if(t==='mf') renderMF(c);
  else if(t==='loans') renderLoans(c);
  else if(t==='india') renderTrade(c,'ti','\u20b9','India Trades');
  else if(t==='us') renderTrade(c,'tu','$','US Trades');
  else if(t==='crypto') renderTrade(c,'tc','$','Crypto Trades');
  else if(t==='eu') renderEuro(c);
  else if(t==='rev') renderReview(c);
}

function init() {
  var root=document.getElementById('app');
  root.innerHTML='';
  var a=div({cls:'app'},root);
  var s=div({cls:'scroll', id:'content'},a);
  var nwrap=div({style:'position:relative;flex-shrink:0'},a);
  el('nav',{id:'nav', cls:'bnav'},nwrap);
  var fade=div({style:'position:absolute;right:0;top:0;bottom:0;width:18px;background:linear-gradient(to right,transparent,rgba(255,255,255,0.95));pointer-events:none'},nwrap);
  loadS(); renderNav(); renderContent();
}
init();
</script>
